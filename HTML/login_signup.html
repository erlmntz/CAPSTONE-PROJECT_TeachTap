<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login and Signup</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/CSS/login_logout.css">
</head>

<body>
    <!-- Background container -->
    <div class="background-container"></div>

    <div class="container d-flex justify-content-center align-items-center min-vh-100">
        <!-- Login Container -->
        <div class="login-container active" style="display: block;">
            <div class="text-center mb-4">
                <img src="/IMAGE/LOGO.png" alt="Logo" style="height: 80px;">
            </div>

            <form id="loginForm" action="login.php" method="POST">
                <div class="mb-3">
                    <label for="loginEmail" class="form-label">Email address</label>
                    <input type="email" class="form-control" id="loginEmail" name="email" placeholder="Enter email" required>
                </div>

                <div class="mb-3">
                    <label for="loginPassword" class="form-label">Password</label>
                    <input type="password" class="form-control" id="loginPassword" name="password" placeholder="Password" required>
                </div>

                <button type="submit" class="btn btn-primary w-100">Login</button>
            </form>

            <div class="mt-3 text-center">
                <p>Don't have an account? <a href="#" class="text-primary" onclick="toggleForms()">Sign Up</a></p>
            </div>
        </div>
        
        <!-- Signup Container -->
        <div class="sign-up-container" style="display: none;">
            <div class="text-center mb-4">
                <img src="/IMAGE/LOGO.png" alt="Logo" style="height: 70px;">
                <h3 class="mt-2">Teacher Sign Up</h3>
            </div>

            <form id="signUpForm">
                <!-- First Name -->
                <div class="mb-3">
                    <label for="firstName" class="form-label">First Name</label>
                    <input type="text" class="form-control" id="firstName" name="firstName" placeholder="Enter your first name" required>
                </div>

                <!-- Last Name -->
                <div class="mb-3">
                    <label for="lastName" class="form-label">Last Name</label>
                    <input type="text" class="form-control" id="lastName" name="lastName" placeholder="Enter your last name" required>
                </div>

                <!-- Email Address -->
                <div class="mb-3">
                    <label for="signUpEmail" class="form-label">Email address</label>
                    <input type="email" class="form-control" id="signUpEmail" name="email" placeholder="Enter your email" required>
                </div>

                <!-- Contact Number -->
                <div class="mb-3">
                    <label for="contactNumber" class="form-label">Contact Number</label>
                    <input type="text" class="form-control" id="contactNumber" name="contactNumber" placeholder="Enter your contact number" required>
                </div>

                <!-- Password -->
                <div class="mb-3">
                    <label for="signUpPassword" class="form-label">Password</label>
                    <input type="password" class="form-control" id="signUpPassword" name="password" placeholder="Enter password" required>
                </div>

                <!-- Confirm Password -->
                <div class="mb-3">
                    <label for="confirmPassword" class="form-label">Confirm Password</label>
                    <input type="password" class="form-control" id="confirmPassword" name="confirmPassword" placeholder="Confirm your password" required>
                </div>

                <!-- Submit Button -->
                <button type="submit" class="btn btn-primary w-100">Sign Up</button>
            </form>

            <div class="mt-4 text-center">
                <p>Already have an account? <a href="#" class="text-primary" onclick="toggleForms()">Login</a></p>
            </div>
        </div>

    </div>

    <script>
        // Handling form submission for login
        document.getElementById('loginForm')?.addEventListener('submit', function(e) {
            e.preventDefault();
            
            const email = document.getElementById('loginEmail').value.trim();
            const password = document.getElementById('loginPassword').value.trim();

            // Check if email and password match the pre-set credentials
            const correctEmail = "earlpapogijr.12@gmail.com";
            const correctPassword = "earlpogi011204";

            if (email === correctEmail && password === correctPassword) {
                // If credentials are correct, redirect to the dashboard
                window.location.href = 'dashboard.html';  // Change this to the correct path for your dashboard
            } else {
                alert('Invalid email or password. Please try again.');
            }
        });

        // Handling form submission for sign up
        document.getElementById('signUpForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const firstName = document.getElementById('firstName').value.trim();
            const lastName = document.getElementById('lastName').value.trim();
            const dob = document.getElementById('dob').value.trim();
            const gender = document.getElementById('gender').value.trim();
            const address = document.getElementById('address').value.trim();
            const contactNumber = document.getElementById('contactNumber').value.trim();
            const email = document.getElementById('signUpEmail').value.trim();
            const password = document.getElementById('signUpPassword').value.trim();
            const confirmPassword = document.getElementById('confirmPassword').value.trim();

            // Password validation
            if (password !== confirmPassword) {
                alert('Passwords do not match. Please try again.');
                return;
            }

            alert('Registration successful! Redirecting to the login page.');
            window.location.href = 'HTML\dashboard.html'; // Redirect after successful registration
        });

        // Toggle between Login and Sign Up forms
        function toggleForms() {
            const loginContainer = document.querySelector('.login-container');
            const signUpContainer = document.querySelector('.sign-up-container');

            loginContainer.classList.toggle('active');
            signUpContainer.classList.toggle('active');
            
            // Toggle visibility
            loginContainer.style.display = loginContainer.style.display === 'none' ? 'block' : 'none';
            signUpContainer.style.display = signUpContainer.style.display === 'none' ? 'block' : 'none';
        }
    </script>
</body>
</html>
