<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Attendance via NFC</title>
    <link href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            padding: 20px;
        }
        .attendance-container {
            text-align: center;
            margin-top: 50px;
        }
        .attendance-table {
            margin-top: 30px;
        }
    </style>
</head>
<body>

<div class="container attendance-container">
    <h2>Attendance Tracking via NFC</h2>

    <form id="attendanceForm">
        <button type="submit" class="btn btn-primary mt-3">Record Attendance for Earl</button>
    </form>

    <div id="message" class="mt-3"></div>

    <div class="attendance-table">
        <h3>Attendance Records</h3>
        <table class="table table-bordered">
            <thead>
                <tr>
                    <th>Name</th>
                    <th>Login Time</th>
                    <th>Logout Time</th>
                    <th>Status</th>
                </tr>
            </thead>
            <tbody id="attendanceTableBody">
            </tbody>
        </table>
    </div>
</div>

<script src="https://code.jquery.com/jquery-3.5.1.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.9.2/dist/umd/popper.min.js"></script>
<script src="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/js/bootstrap.min.js"></script>

<script>
$(document).ready(function(){
    // Handle attendance form submission
    $('#attendanceForm').submit(function(event){
        event.preventDefault();  // Prevent default form submission

        $('#message').text("Processing Attendance...");

        const attendanceData = {
            name: 'Earl',
            login_time: '07:10 AM',
            logout_time: '04:00 PM'
        };

        $.ajax({
            url: 'attendance.php',
            type: 'POST',
            data: {
                action: 'mark_attendance',
                name: attendanceData.name,
                login_time: attendanceData.login_time,
                logout_time: attendanceData.logout_time
            },
            success: function(response){
                $('#message').text(response.message);
                loadAttendanceData();  // Reload attendance table
            },
            error: function(){
                $('#message').text("Error occurred, please try again.");
            }
        });
    });

    // Load attendance data
    function loadAttendanceData() {
        $.ajax({
            url: 'load_attendance.php',
            type: 'GET',
            success: function(response){
                let tableBody = $('#attendanceTableBody');
                tableBody.empty();  // Clear the existing data
                let data = JSON.parse(response);

                data.forEach(function(record){
                    let status = (new Date(record.login_time).getHours() >= 7) ? 'Late' : 'On Time';
                    let row = `<tr>
                        <td>${record.name}</td>
                        <td>${record.login_time}</td>
                        <td>${record.logout_time}</td>
                        <td>${status}</td>
                    </tr>`;
                    tableBody.append(row);
                });
            },
            error: function(){
                alert("Error loading attendance data.");
            }
        });
    }

    // Initially load attendance data
    loadAttendanceData();
});
</script>

</body>
</html>
