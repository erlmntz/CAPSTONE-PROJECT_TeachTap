<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Login</title>
  <link rel="stylesheet" href="/CSS/admin_login.css" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">
</head>

<body>
  <div class="background-container"></div>

  <div class="container d-flex justify-content-center align-items-center min-vh-100">
    <div class="login-container">
      <div class="text-center mb-4">
        <img src="/IMAGES/LOGO.png" alt="Logo" style="height: 80px" />
      </div>

      <h3 class="text-center mb-4">Admin Login</h3>

      <form id="loginForm">
        <div class="mb-3">
          <label for="loginEmail" class="form-label">Email address</label>
          <input
            type="email"
            class="form-control"
            id="loginEmail"
            name="email"
            placeholder="Enter email"
            required
          />
        </div>

        <div class="mb-3">
          <label for="loginPassword" class="form-label">Password</label>
          <input
            type="password"
            class="form-control"
            id="loginPassword"
            name="password"
            placeholder="Password"
            required
          />
        </div>

        <button type="submit" class="btn btn-primary w-100">Login</button>
      </form>

      <div class="mt-3 text-center">
        <p>
          <a href="#" class="text-primary" data-bs-toggle="modal" data-bs-target="#forgotPasswordModal">
            Forgot Password?
          </a>
        </p>
      </div>
    </div>
  </div>

  <!-- Forgot Password Modal -->
  <div class="modal fade" id="forgotPasswordModal" tabindex="-1" aria-labelledby="forgotPasswordModalLabel" aria-hidden="true">
    <div class="modal-dialog">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title" id="forgotPasswordModalLabel">Forgot Password</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
        </div>
        <div class="modal-body">
          <form id="forgotPasswordForm">
            <div class="mb-3">
              <label for="forgotEmail" class="form-label">Email address</label>
              <input
                type="email"
                class="form-control"
                id="forgotEmail"
                name="email"
                placeholder="Enter your email"
                required
              />
            </div>
            <button type="submit" class="btn btn-primary w-100">
              Reset Password
            </button>
          </form>
        </div>
      </div>
    </div>
  </div>

  <!-- OTP Verification Modal -->
  <div class="modal fade" id="otpModal" tabindex="-1" aria-labelledby="otpModalLabel" aria-hidden="true" data-bs-backdrop="static" data-bs-keyboard="false">
    <div class="modal-dialog modal-dialog-centered">
      <div class="modal-content border-0 shadow">
        <div class="modal-header bg-primary text-white">
          <h5 class="modal-title fw-bold" id="otpModalLabel">
            <i class="bi bi-shield-lock me-2"></i> OTP Verification
          </h5>
        </div>
        <div class="modal-body p-4">
          <div class="text-center mb-4">
            <div class="bg-primary bg-opacity-10 p-3 rounded-circle d-inline-block">
              <i class="bi bi-envelope-check text-primary" style="font-size: 2rem;"></i>
            </div>
            <p class="mt-3 mb-1">We've sent a 6-digit OTP to your registered email.</p>
            <p class="text-muted small">(For demo purposes, use: <span class="badge bg-primary" id="demoOtp">123456</span>)</p>
          </div>
          
          <form id="otpForm">
            <div class="mb-4">
              <label for="otpInput" class="form-label fw-medium">Enter OTP Code</label>
              <div class="input-group">
                <input
                  type="text"
                  class="form-control form-control-lg text-center fw-bold otp-input"
                  id="otpInput"
                  name="otp"
                  placeholder="• • • • • •"
                  maxlength="6"
                  required
                  style="letter-spacing: 8px;"
                />
                <span class="input-group-text bg-primary text-white">
                  <i class="bi bi-key-fill"></i>
                </span>
              </div>
            </div>
            
            <button type="button" class="btn btn-primary w-100 py-2 fw-bold" id="confirmOtpBtn" style="display: none;">
              <i class="bi bi-check-circle me-2"></i> Verify & Continue
            </button>
          </form>
          
          <div class="mt-4 text-center">
            <p class="small text-muted mb-2">Didn't receive the code?</p>
            <a href="#" class="btn btn-outline-primary btn-sm" id="resendOtp">
              <i class="bi bi-arrow-clockwise me-1"></i> Resend OTP
            </a>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script>
    document.getElementById("loginForm").addEventListener("submit", function(e) {
      e.preventDefault();
      const email = document.getElementById("loginEmail").value.trim();
      const password = document.getElementById("loginPassword").value.trim();
      const correctEmail = "admin@admin";
      const correctPassword = "admin123";

      if (email === correctEmail && password === correctPassword) {
        const otpModal = new bootstrap.Modal(document.getElementById('otpModal'));
        otpModal.show();
      } else {
        alert("Invalid email or password. Please try again.");
      }
    });

    document.getElementById("forgotPasswordForm").addEventListener("submit", function(e) {
      e.preventDefault();
      const email = document.getElementById("forgotEmail").value.trim();
      alert(`A password reset link has been sent to ${email}. Please check your email.`);
      bootstrap.Modal.getInstance(document.getElementById('forgotPasswordModal')).hide();
    });
    
    document.getElementById("otpInput").addEventListener("input", function(e) {
      const enteredOtp = this.value;
      const demoOtp = document.getElementById("demoOtp").textContent;
      const confirmBtn = document.getElementById("confirmOtpBtn");

      if (enteredOtp.length === 6 && enteredOtp === demoOtp) {
        confirmBtn.style.display = "block";
      } else {
        confirmBtn.style.display = "none";
      }
    });

    document.getElementById("confirmOtpBtn").addEventListener("click", function() {
      const btn = this;
      btn.innerHTML = '<span class="spinner-border spinner-border-sm me-2" role="status" aria-hidden="true"></span>Verifying...';
      btn.disabled = true;

      setTimeout(() => {
        window.location.href = "admin.html";
      }, 1500);
    });

    document.getElementById("resendOtp").addEventListener("click", function(e) {
      e.preventDefault();
      const resendBtn = this;
      resendBtn.innerHTML = '<span class="spinner-border spinner-border-sm me-2" role="status" aria-hidden="true"></span>Sending...';
      resendBtn.disabled = true;

      setTimeout(() => {
        resendBtn.innerHTML = '<i class="bi bi-arrow-clockwise me-1"></i> Resend OTP';
        resendBtn.disabled = false;
        document.getElementById("otpInput").value = "";
        document.getElementById("confirmOtpBtn").style.display = "none";
        alert("A new OTP has been sent to your email.");
      }, 1000);
    });
  </script>
</body>
</html>
