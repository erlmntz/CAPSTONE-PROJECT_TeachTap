<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Admin Login</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <style>
      .background-container {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: url("/IMAGES/LogInBG.jpg") no-repeat center center/cover;
        z-index: -1;
        filter: blur(10px);
      }
      .login-container {
        background: rgba(255, 255, 255, 0.9);
        padding: 20px;
        border-radius: 10px;
        box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
        max-width: 400px;
        width: 100%;
        margin: auto;
      }
    </style>
  </head>

  <body>
    <!-- Background container with blur effect -->
    <div class="background-container"></div>

    <div
      class="container d-flex justify-content-center align-items-center min-vh-100"
    >
      <!-- Login Container -->
      <div class="login-container">
        <div class="text-center mb-4">
          <img src="/IMAGES//LOGO.png" alt="Logo" style="height: 80px" />
        </div>

        <h3 class="text-center mb-4">Admin Login</h3>

        <form id="loginForm" action="login.php" method="POST">
          <div class="mb-3">
            <label for="loginEmail" class="form-label">Email address</label>
            <input
              type="email"
              class="form-control"
              id="loginEmail"
              name="email"
              placeholder="Enter email"
              required
            />
          </div>

          <div class="mb-3">
            <label for="loginPassword" class="form-label">Password</label>
            <input
              type="password"
              class="form-control"
              id="loginPassword"
              name="password"
              placeholder="Password"
              required
            />
          </div>

          <button type="submit" class="btn btn-primary w-100">Login</button>
        </form>

        <div class="mt-3 text-center">
          <p>
            <a
              href="#"
              class="text-primary"
              data-bs-toggle="modal"
              data-bs-target="#forgotPasswordModal"
              >Forgot Password?</a
            >
          </p>
        </div>
      </div>
    </div>

    <!-- Forgot Password Modal -->
    <div
      class="modal fade"
      id="forgotPasswordModal"
      tabindex="-1"
      aria-labelledby="forgotPasswordModalLabel"
      aria-hidden="true"
    >
      <div class="modal-dialog">
        <div class="modal-content">
          <div class="modal-header">
            <h5 class="modal-title" id="forgotPasswordModalLabel">
              Forgot Password
            </h5>
            <button
              type="button"
              class="btn-close"
              data-bs-dismiss="modal"
              aria-label="Close"
            ></button>
          </div>
          <div class="modal-body">
            <form id="forgotPasswordForm">
              <div class="mb-3">
                <label for="forgotEmail" class="form-label"
                  >Email address</label
                >
                <input
                  type="email"
                  class="form-control"
                  id="forgotEmail"
                  name="email"
                  placeholder="Enter your email"
                  required
                />
              </div>
              <button type="submit" class="btn btn-primary w-100">
                Reset Password
              </button>
            </form>
          </div>
        </div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
      // Handling form submission for login
      document
        .getElementById("loginForm")
        ?.addEventListener("submit", function (e) {
          e.preventDefault();

          const email = document.getElementById("loginEmail").value.trim();
          const password = document
            .getElementById("loginPassword")
            .value.trim();

          // Check if email and password match the pre-set credentials
          const correctEmail = "admin@admin";
          const correctPassword = "admin123";

          if (email === correctEmail && password === correctPassword) {
            // If credentials are correct, redirect to the dashboard
            window.location.href = "admin.html"; // Change this to the correct path for your dashboard
          } else {
            alert("Invalid email or password. Please try again.");
          }
        });

      // Handling form submission for forgot password
      document
        .getElementById("forgotPasswordForm")
        .addEventListener("submit", function (e) {
          e.preventDefault();

          const email = document.getElementById("forgotEmail").value.trim();

          // Simulate sending a reset password email
          alert(
            `A password reset link has been sent to ${email}. Please check your email.`
          );
          document
            .getElementById("forgotPasswordModal")
            .querySelector(".btn-close")
            .click(); // Close the modal
        });
    </script>
  </body>
</html>
